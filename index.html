<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <title>Barkod Envanter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
  <style>
    @keyframes scan {
      0%, 100% { top: 0; opacity: 1; }
      50% { top: 100%; opacity: 0.5; }
    }
    .animate-scan {
      animation: scan 2s ease-in-out infinite;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app" class="max-w-md mx-auto min-h-screen bg-gray-50 relative">
    <!-- Content injected by JS -->
  </div>

  <script>
    // ============ STATE ============
    let records = [];
    let viewState = 'list';
    let selectedRecord = null;
    let currentBarcode = '';
    let currentName = '';
    let currentPhoto = null;
    let currentLocation = null;
    let currentNotes = '';
    let searchQuery = '';
    let scanning = false;
    let flashOn = false;
    
    let videoElement = null;
    let canvasElement = null;
    let barcodeReader = null;
    let mediaStream = null;

    // ============ STORAGE ============
    function loadRecords() {
      const saved = localStorage.getItem('barcodeRecords');
      if (saved) {
        records = JSON.parse(saved);
      }
    }

    function saveRecords() {
      localStorage.setItem('barcodeRecords', JSON.stringify(records));
    }

    // ============ BARCODE SCANNING ============
    async function startBarcodeScanning() {
      if (!ZXing || !videoElement) return;
      
      scanning = true;
      currentBarcode = '';
      render();
      
      try {
        const codeReader = new ZXing.BrowserMultiFormatReader();
        barcodeReader = codeReader;
        
        await codeReader.decodeFromVideoDevice(
          undefined,
          videoElement,
          (result, error) => {
            if (result) {
              const code = result.getText();
              currentBarcode = code;
              currentName = 'Ürün ' + code.slice(-6);
              getLocation();
              
              // Stop scanning
              codeReader.reset();
              scanning = false;
              
              // Vibrate
              if (navigator.vibrate) {
                navigator.vibrate(200);
              }
              
              // Move to camera
              setTimeout(() => {
                viewState = 'camera';
                render();
                startCamera();
              }, 500);
            }
          }
        );
      } catch (err) {
        console.error('Barkod okuma hatası:', err);
        scanning = false;
        render();
      }
    }

    function stopBarcodeScanning() {
      if (barcodeReader) {
        barcodeReader.reset();
        barcodeReader = null;
      }
      scanning = false;
    }

    // ============ CAMERA ============
    async function startCamera() {
      try {
        const constraints = {
          video: {
            facingMode: 'environment',
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        };
        
        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        if (videoElement) {
          videoElement.srcObject = mediaStream;
        }
      } catch (err) {
        console.error('Kamera hatası:', err);
        alert('Kamera erişimi sağlanamadı. Galeriden fotoğraf seçebilirsiniz.');
      }
    }

    function stopCamera() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      if (videoElement) {
        videoElement.srcObject = null;
      }
    }

    async function toggleFlash() {
      if (!mediaStream) return;
      
      const track = mediaStream.getVideoTracks()[0];
      const capabilities = track.getCapabilities();
      
      if (capabilities.torch) {
        try {
          await track.applyConstraints({
            advanced: [{ torch: !flashOn }]
          });
          flashOn = !flashOn;
          render();
        } catch (err) {
          console.error('Flash hatası:', err);
        }
      }
    }

    function capturePhoto() {
      if (!videoElement || !canvasElement) return;
      
      canvasElement.width = videoElement.videoWidth || 1280;
      canvasElement.height = videoElement.videoHeight || 720;
      
      const ctx = canvasElement.getContext('2d');
      ctx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
      
      currentPhoto = canvasElement.toDataURL('image/jpeg', 0.7);
      stopCamera();
      viewState = 'review';
      render();
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          currentPhoto = e.target.result;
          viewState = 'review';
          render();
        };
        reader.readAsDataURL(file);
      }
    }

    // ============ LOCATION ============
    function getLocation() {
      if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const { latitude, longitude } = position.coords;
            
            try {
              const response = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`
              );
              const data = await response.json();
              currentLocation = {
                latitude,
                longitude,
                address: data.display_name || 'Adres bulunamadı'
              };
            } catch {
              currentLocation = { latitude, longitude };
            }
            render();
          },
          () => {
            currentLocation = null;
            render();
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }
    }

    // ============ RECORDS ============
    function saveRecord() {
      if (!currentBarcode) return;

      const newRecord = {
        id: Date.now().toString(),
        barcode: currentBarcode,
        name: currentName || 'Ürün ' + currentBarcode.slice(-6),
        photo: currentPhoto,
        timestamp: Date.now(),
        date: new Date().toLocaleString('tr-TR'),
        location: currentLocation,
        notes: currentNotes
      };

      records.unshift(newRecord);
      saveRecords();
      resetAndGoHome();
    }

    function resetAndGoHome() {
      viewState = 'list';
      currentBarcode = '';
      currentName = '';
      currentPhoto = null;
      currentLocation = null;
      currentNotes = '';
      flashOn = false;
      stopCamera();
      stopBarcodeScanning();
      render();
    }

    function deleteRecord(id, event) {
      if (event) event.stopPropagation();
      if (confirm('Bu kaydı silmek istediğine emin misin?')) {
        records = records.filter(r => r.id !== id);
        saveRecords();
        if (selectedRecord && selectedRecord.id === id) {
          selectedRecord = null;
          viewState = 'list';
        }
        render();
      }
    }

    function openDetail(record) {
      selectedRecord = record;
      viewState = 'detail';
      render();
    }

    async function shareRecord(record) {
      const shareText = `${record.name}\nBarkod: ${record.barcode}\nTarih: ${record.date}`;
      
      if (navigator.share) {
        try {
          await navigator.share({
            title: record.name,
            text: shareText
          });
        } catch {
          // Cancelled
        }
      } else {
        await navigator.clipboard.writeText(shareText);
        alert('Kayıt bilgileri kopyalandı!');
      }
    }

    function exportToCSV() {
      const headers = ['ID', 'Barkod', 'Ürün Adı', 'Tarih', 'Enlem', 'Boylam', 'Adres', 'Notlar'];
      const rows = records.map(r => [
        r.id,
        r.barcode,
        r.name,
        r.date,
        r.location?.latitude || '',
        r.location?.longitude || '',
        r.location?.address || '',
        r.notes
      ]);
      
      const csv = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `envanter_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    // ============ RENDER ============
    function render() {
      const app = document.getElementById('app');
      const filteredRecords = records.filter(r => 
        r.barcode.includes(searchQuery) || 
        r.name.toLowerCase().includes(searchQuery.toLowerCase())
      );

      // SCANNING VIEW
      if (viewState === 'scanning') {
        app.innerHTML = `
          <div class="min-h-screen bg-black relative overflow-hidden">
            <div class="h-screen flex flex-col">
              <div class="flex items-center justify-between p-4 bg-black/80 z-20">
                <button onclick="resetAndGoHome()" class="text-white p-2 text-lg">✕</button>
                <h1 class="text-white font-bold text-lg">Barkod Tara</h1>
                <div class="w-10"></div>
              </div>
              
              <div class="flex-1 relative bg-black">
                <video id="video" autoplay playsinline muted class="w-full h-full object-cover"></video>
                
                <div class="absolute inset-0 pointer-events-none">
                  <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-72 h-48">
                    <div class="absolute top-0 left-0 w-8 h-8 border-l-4 border-t-4 border-blue-500"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-r-4 border-t-4 border-blue-500"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-l-4 border-b-4 border-blue-500"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-r-4 border-b-4 border-blue-500"></div>
                    <div class="absolute top-0 left-0 right-0 h-0.5 bg-blue-500 animate-scan"></div>
                  </div>
                  <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 mt-32">
                    <p class="text-white/80 text-sm bg-black/50 px-4 py-2 rounded-full">
                      ${scanning ? 'Barkod okunuyor...' : 'Kamera başlatılıyor...'}
                    </p>
                  </div>
                </div>
              </div>
              
              <div class="p-6 bg-black z-20">
                <div class="text-center">
                  <p class="text-white/60 text-sm">Barkodu kare içine hizalayın</p>
                </div>
              </div>
            </div>
          </div>
        `;
        
        setTimeout(() => {
          videoElement = document.getElementById('video');
          startBarcodeScanning();
        }, 100);
        return;
      }

      // CAMERA VIEW
      if (viewState === 'camera') {
        app.innerHTML = `
          <div class="fixed inset-0 bg-black z-50 flex flex-col">
            <!-- Header -->
            <div class="flex items-center justify-between p-4 bg-black/90" style="height: 60px;">
              <button onclick="goBackToScanning()" class="text-white px-3 py-2 text-2xl">←</button>
              <h1 class="text-white font-bold text-lg">Fotoğraf Çek</h1>
              <button onclick="toggleFlash()" class="px-3 py-2 text-2xl ${flashOn ? 'text-yellow-400' : 'text-white'}">⚡</button>
            </div>
            
            <!-- Camera Preview -->
            <div class="flex-1 relative bg-gray-900" style="min-height: 0;">
              <video id="video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
              
              <!-- Focus corners overlay -->
              <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; pointer-events: none;">
                <div style="position: absolute; top: 0; left: 0; width: 30px; height: 30px; border-left: 3px solid white; border-top: 3px solid white;"></div>
                <div style="position: absolute; top: 0; right: 0; width: 30px; height: 30px; border-right: 3px solid white; border-top: 3px solid white;"></div>
                <div style="position: absolute; bottom: 0; left: 0; width: 30px; height: 30px; border-left: 3px solid white; border-bottom: 3px solid white;"></div>
                <div style="position: absolute; bottom: 0; right: 0; width: 30px; height: 30px; border-right: 3px solid white; border-bottom: 3px solid white;"></div>
              </div>
            </div>
            
            <!-- Controls - Fixed bottom -->
            <div class="bg-black p-4 pb-8" style="height: 120px;">
              <div style="display: flex; align-items: center; justify-content: center; gap: 40px; height: 100%;">
                <!-- Gallery Button -->
                <label style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                  <span style="font-size: 32px;">🖼️</span>
                  <input type="file" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
                </label>
                
                <!-- Capture Button -->
                <button onclick="capturePhoto()" style="width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; display: flex; align-items: center; justify-content: center; background: transparent;">
                  <div style="width: 64px; height: 64px; border-radius: 50%; background: white;"></div>
                </button>
                
                <!-- Spacer for alignment -->
                <div style="width: 60px;"></div>
              </div>
            </div>
          </div>
          <canvas id="canvas" style="display: none;"></canvas>
        `;
        
        setTimeout(() => {
          videoElement = document.getElementById('video');
          canvasElement = document.getElementById('canvas');
          startCamera();
        }, 100);
        return;
      }

      // REVIEW VIEW
      if (viewState === 'review') {
        app.innerHTML = `
          <div class="min-h-screen bg-gray-50">
            <div class="flex items-center justify-between p-4 bg-white shadow-sm sticky top-0 z-10">
              <button onclick="viewState='camera'; render(); startCamera();" class="text-gray-600 p-2">←</button>
              <h1 class="font-bold text-gray-900">Kayıt Oluştur</h1>
              <div class="w-10"></div>
            </div>
            
            <div class="p-4 space-y-4 pb-24">
              ${currentPhoto ? `
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm">
                  <img src="${currentPhoto}" class="w-full h-64 object-cover">
                </div>
              ` : ''}
              
              <div class="bg-white rounded-2xl p-4 shadow-sm space-y-4">
                <div>
                  <label class="text-sm text-gray-500 font-medium">BARKOD</label>
                  <p class="text-xl font-mono font-bold text-gray-900">${currentBarcode}</p>
                </div>
                
                <div>
                  <label class="text-sm text-gray-500 font-medium">ÜRÜN ADI</label>
                  <input type="text" id="nameInput" value="${currentName}" placeholder="Ürün adı girin..." 
                    class="w-full mt-1 px-3 py-3 bg-gray-100 rounded-xl border-0 focus:ring-2 focus:ring-blue-500 outline-none"
                    onchange="currentName=this.value">
                </div>
                
                <div>
                  <label class="text-sm text-gray-500 font-medium">TARİH & SAAT</label>
                  <p class="text-gray-900 font-medium">${new Date().toLocaleString('tr-TR')}</p>
                </div>
                
                <div>
                  <label class="text-sm text-gray-500 font-medium">KONUM</label>
                  ${currentLocation ? `
                    <div class="mt-1 bg-green-50 p-3 rounded-xl">
                      <p class="text-gray-900 text-sm">📍 ${currentLocation.address || currentLocation.latitude.toFixed(4) + ', ' + currentLocation.longitude.toFixed(4)}</p>
                    </div>
                  ` : '<p class="text-gray-400 text-sm mt-1">Konum alınıyor...</p>'}
                </div>
                
                <div>
                  <label class="text-sm text-gray-500 font-medium">NOTLAR</label>
                  <textarea id="notesInput" placeholder="Ek notlar..." rows="3"
                    class="w-full mt-1 px-3 py-3 bg-gray-100 rounded-xl border-0 focus:ring-2 focus:ring-blue-500 resize-none outline-none"
                    onchange="currentNotes=this.value"></textarea>
                </div>
              </div>
              
              <div class="flex gap-3">
                <button onclick="viewState='camera'; render(); startCamera();" class="flex-1 py-4 bg-gray-200 text-gray-700 rounded-xl font-bold">Tekrar Çek</button>
                <button onclick="saveRecordFromReview()" class="flex-1 py-4 bg-blue-500 text-white rounded-xl font-bold">💾 Kaydet</button>
              </div>
            </div>
          </div>
        `;
        
        setTimeout(() => {
          const nameInput = document.getElementById('nameInput');
          const notesInput = document.getElementById('notesInput');
          if (nameInput) nameInput.addEventListener('input', (e) => currentName = e.target.value);
          if (notesInput) notesInput.addEventListener('input', (e) => currentNotes = e.target.value);
        }, 100);
        return;
      }

      // DETAIL VIEW
      if (viewState === 'detail' && selectedRecord) {
        const r = selectedRecord;
        app.innerHTML = `
          <div class="min-h-screen bg-gray-50">
            <div class="flex items-center justify-between p-4 bg-white shadow-sm sticky top-0 z-10">
              <button onclick="viewState='list'; selectedRecord=null; render();" class="text-gray-600 p-2">←</button>
              <h1 class="font-bold text-gray-900">Kayıt Detayı</h1>
              <button onclick="shareRecord(selectedRecord)" class="p-2 text-blue-500">📤</button>
            </div>
            
            <div class="p-4 space-y-4 pb-24">
              <div class="bg-white rounded-2xl overflow-hidden shadow-sm">
                ${r.photo ? `<img src="${r.photo}" class="w-full h-80 object-cover">` : 
                  `<div class="w-full h-64 bg-gray-100 flex items-center justify-center"><span class="text-8xl">📦</span></div>`}
              </div>
              
              <div class="bg-white rounded-2xl p-5 shadow-sm space-y-5">
                <div>
                  <label class="text-sm text-gray-500 font-medium">ÜRÜN ADI</label>
                  <h2 class="text-2xl font-bold text-gray-900 mt-1">${r.name}</h2>
                </div>
                
                <div class="h-px bg-gray-100"></div>
                
                <div>
                  <label class="text-sm text-gray-500 font-medium">BARKOD</label>
                  <p class="text-xl font-mono font-bold text-gray-900 mt-1">${r.barcode}</p>
                </div>
                
                <div class="h-px bg-gray-100"></div>
                
                <div>
                  <label class="text-sm text-gray-500 font-medium">KAYIT TARİHİ</label>
                  <div class="flex items-center gap-2 mt-1">
                    <span class="text-2xl">📅</span>
                    <div>
                      <p class="font-bold text-gray-900">${r.date.split(' ')[0]}</p>
                      <p class="text-gray-500">${r.date.split(' ')[1] || ''}</p>
                    </div>
                  </div>
                </div>
                
                <div class="h-px bg-gray-100"></div>
                
                <div>
                  <label class="text-sm text-gray-500 font-medium">KONUM</label>
                  ${r.location ? `
                    <div class="mt-2">
                      <div class="bg-gray-100 rounded-xl p-4">
                        <div class="flex items-start gap-3">
                          <span class="text-2xl">📍</span>
                          <div class="flex-1">
                            <p class="text-gray-900 text-sm leading-relaxed">${r.location.address || 'Adres bilgisi yok'}</p>
                            <p class="text-xs text-gray-500 mt-2 font-mono">${r.location.latitude.toFixed(6)}, ${r.location.longitude.toFixed(6)}</p>
                          </div>
                        </div>
                      </div>
                      <a href="https://www.google.com/maps?q=${r.location.latitude},${r.location.longitude}" target="_blank" 
                        class="mt-3 w-full py-3 bg-green-500 text-white rounded-xl font-bold flex items-center justify-center gap-2 inline-block text-center">
                        <span>🗺️</span> Google Maps'te Aç
                      </a>
                    </div>
                  ` : '<p class="text-gray-400 mt-2">Konum bilgisi kaydedilmemiş</p>'}
                </div>
                
                ${r.notes ? `
                  <div class="h-px bg-gray-100"></div>
                  <div>
                    <label class="text-sm text-gray-500 font-medium">NOTLAR</label>
                    <p class="text-gray-900 mt-2 bg-yellow-50 p-4 rounded-xl">${r.notes}</p>
                  </div>
                ` : ''}
              </div>
              
              <button onclick="deleteRecord('${r.id}')" class="w-full py-4 bg-red-100 text-red-600 rounded-xl font-bold">🗑️ Kaydı Sil</button>
            </div>
          </div>
        `;
        return;
      }

      // LIST VIEW (default)
      app.innerHTML = `
        <div class="min-h-screen bg-gray-50">
          <div class="bg-white shadow-sm sticky top-0 z-10">
            <div class="p-4">
              <div class="flex justify-between items-center mb-4">
                <div>
                  <h1 class="text-2xl font-bold text-gray-900">📦 Envanter</h1>
                  <p class="text-sm text-gray-500">${records.length} kayıt</p>
                </div>
                <button onclick="startScanningFlow()" class="px-5 py-3 bg-blue-500 text-white rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-blue-500/30 active:scale-95 transition-transform">
                  <span class="text-xl">📷</span> Tara
                </button>
              </div>
              
              <div class="relative">
                <input type="text" id="searchInput" value="${searchQuery}" placeholder="Barkod veya ürün adı ara..." 
                  class="w-full pl-11 pr-4 py-3 bg-gray-100 rounded-xl border-0 focus:ring-2 focus:ring-blue-500 outline-none">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">🔍</span>
              </div>
            </div>
          </div>
          
          <div class="p-4 pb-24 space-y-3">
            ${filteredRecords.length === 0 ? `
              <div class="text-center py-16">
                <div class="text-7xl mb-4">📭</div>
                <p class="text-gray-500 text-lg">${searchQuery ? 'Arama sonucu bulunamadı' : 'Henüz kayıt yok'}</p>
                ${!searchQuery ? `<button onclick="startScanningFlow()" class="mt-6 px-8 py-4 bg-blue-500 text-white rounded-xl font-bold shadow-lg">📷 İlk Kaydı Oluştur</button>` : ''}
              </div>
            ` : filteredRecords.map(r => `
              <div onclick='openDetailById("${r.id}")' class="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow cursor-pointer active:scale-[0.98]">
                <div class="flex gap-4">
                  <div class="w-20 h-20 rounded-xl bg-gray-100 overflow-hidden flex-shrink-0">
                    ${r.photo ? `<img src="${r.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-3xl">📦</div>`}
                  </div>
                  <div class="flex-1 min-w-0">
                    <h3 class="font-bold text-gray-900 truncate text-lg">${r.name}</h3>
                    <p class="font-mono text-sm text-gray-500">${r.barcode}</p>
                    <div class="flex items-center gap-3 mt-2 text-xs text-gray-400">
                      <span>🕐 ${r.date.split(' ')[0]}</span>
                      ${r.location ? '<span>📍</span>' : ''}
                    </div>
                  </div>
                  <button onclick='deleteRecord("${r.id}", event)' class="p-2 text-gray-300 hover:text-red-500 transition-colors">🗑️</button>
                </div>
              </div>
            `).join('')}
          </div>
          
          ${records.length > 0 ? `
            <div class="fixed bottom-4 right-4">
              <button onclick="exportToCSV()" class="w-14 h-14 bg-green-500 text-white rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-green-600 transition-colors" title="CSV olarak dışa aktar">📊</button>
            </div>
          ` : ''}
          
          <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 text-center text-xs text-gray-500">
            📱 Ana ekrana ekleyin: Safari/Chrome menüsü → Ana Ekrana Ekle
          </div>
        </div>
      `;
      
      setTimeout(() => {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
          });
        }
      }, 100);
    }

    // Helper functions for inline onclick handlers
    function startScanningFlow() {
      viewState = 'scanning';
      render();
    }

    function goBackToScanning() {
      stopCamera();
      viewState = 'scanning';
      render();
      setTimeout(() => {
        startBarcodeScanning();
      }, 100);
    }

    function saveRecordFromReview() {
      currentName = document.getElementById('nameInput')?.value || currentName;
      currentNotes = document.getElementById('notesInput')?.value || currentNotes;
      saveRecord();
    }

    function openDetailById(id) {
      const record = records.find(r => r.id === id);
      if (record) {
        selectedRecord = record;
        viewState = 'detail';
        render();
      }
    }

    // Initialize
    loadRecords();
    render();
  </script>
</body>
</html>
